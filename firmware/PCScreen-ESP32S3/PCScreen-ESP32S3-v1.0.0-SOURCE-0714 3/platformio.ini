[platformio]
default_envs = esp32-s3-super-mini-4mb
data_dir = data

[env:esp32-s3-super-mini]
platform = platformio/espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.embed_txtfiles =
    data/index.html
    data/app.js
    data/v6.css
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    lovyan03/LovyanGFX@1.2.7
    bblanchon/ArduinoJson@7.4.3
    bitbank2/AnimatedGIF@2.2.3
    adafruit/Adafruit NeoPixel@1.15.5
    links2004/WebSockets@2.6.1

[env:esp32-s3-super-mini-4mb]
platform = platformio/espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.embed_txtfiles =
    data/index.html
    data/app.js
    data/v6.css
board_build.partitions = partitions_4mb_assets.csv
board_upload.flash_size = 4MB
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    lovyan03/LovyanGFX@1.2.7
    bblanchon/ArduinoJson@7.4.3
    bitbank2/AnimatedGIF@2.2.3
    adafruit/Adafruit NeoPixel@1.15.5
    links2004/WebSockets@2.6.1
