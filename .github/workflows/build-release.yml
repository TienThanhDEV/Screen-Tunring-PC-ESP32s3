name: Validate, Build, Pages and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pcscreen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: pip install 'platformio==6.1.18'
      - name: Build firmware 4 MB
        working-directory: firmware
        run: pio run -e esp32-s3-super-mini-4mb
      - name: Package OTA and full USB image
        shell: bash
        run: |
          set -euo pipefail
          BUILD=firmware/.pio/build/esp32-s3-super-mini-4mb
          mkdir -p dist/firmware
          python firmware/tools/make_ota.py "$BUILD/firmware.bin" dist/firmware/PCScreen-S3-4MB-v1.7.0.pcota
          cp "$BUILD/firmware.bin" "$BUILD/bootloader.bin" "$BUILD/partitions.bin" dist/firmware/
          cp "$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" dist/firmware/
          python "$HOME/.platformio/packages/tool-esptoolpy/esptool.py" --chip esp32s3 merge_bin \
            --flash_mode dio --flash_freq 80m --flash_size 4MB \
            -o dist/firmware/PCScreen-S3-4MB-v1.7.0-FULL.bin \
            0x0 "$BUILD/bootloader.bin" 0x8000 "$BUILD/partitions.bin" \
            0xe000 dist/firmware/boot_app0.bin 0x10000 "$BUILD/firmware.bin"
          cd dist/firmware && sha256sum * > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: dist/firmware

  windows-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish one self-contained EXE
        run: dotnet publish windows-agent/PCScreen.WindowsAgent/PCScreen.WindowsAgent.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o dist/windows
      - name: Package Windows Agent
        shell: pwsh
        run: Compress-Archive -Path dist/windows/* -DestinationPath PCScreen-Windows-Agent-v1.5.0-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-agent-${{ github.sha }}
          path: PCScreen-Windows-Agent-v1.5.0-win-x64.zip

  web-and-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JSON and JavaScript
        run: |
          node --check firmware/data/app.js
          node --check firmware/data/i18n.js
          node --check docs/app.js
          node --check docs/i18n.js
          node --check cloudflare-worker/src/index.js
          python -m json.tool docs/data/firmware-manifest.json >/dev/null
          python -m json.tool docs/data/device-manifest.json >/dev/null
          python -m json.tool docs/data/effects.json >/dev/null
          python -m json.tool docs/data/pages.json >/dev/null
          PYTHONPYCACHEPREFIX=/tmp/pcscreen-pycache python -m py_compile mac-agent/pcscreen_mac_agent.py
      - name: Validate Cloudflare Worker bundle
        working-directory: cloudflare-worker
        run: npm install --ignore-scripts && npx wrangler deploy --dry-run

  pages:
    if: github.ref == 'refs/heads/main'
    needs: [web-and-worker]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [firmware, windows-agent, web-and-worker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ github.sha }}'
          merge-multiple: true
          path: dist
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
